<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enhanced Admin Dashboard - Live Chat, Messaging & Case Management">
    <title>GBV Help App - Enhanced Admin Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple: #6a1b9a;
            --purple-dark: #4a148c;
            --danger: #c62828;
            --success: #2e7d32;
            --warning: #f57c00;
            --bg: #f5f5f5;
            --white: #ffffff;
            --text: #333;
            --text-muted: #666;
            --radius: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr 1.5fr;
            gap: 16px;
            padding: 16px;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .admin-header {
            grid-column: 1 / -1;
            background: var(--purple-dark);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .admin-header h1 {
            font-size: 1.5rem;
        }

        .status-indicator {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Left Panel - Reports List */
        .panel {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: var(--purple);
            color: white;
            padding: 16px;
            font-weight: 600;
            font-size: 14px;
        }

        .reports-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .report-item {
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f9f9f9;
        }

        .report-item:hover {
            background: #f0f0f0;
        }

        .report-item.active {
            background: #e8d5f2;
            border-left-color: var(--purple);
        }

        .report-item.urgent {
            border-left-color: var(--danger);
            background: #ffebee;
        }

        .report-item-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .report-item-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            margin-right: 4px;
        }

        .badge-urgent { background: var(--danger); color: white; }
        .badge-new { background: var(--warning); color: white; }
        .badge-investigating { background: #2196f3; color: white; }
        .badge-resolved { background: var(--success); color: white; }

        /* Center Panel - Chat & Messages */
        .chat-panel {
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: var(--purple);
            color: white;
            padding: 16px;
            font-weight: 600;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--white);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .message.admin {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 13px;
        }

        .message.victim .message-bubble {
            background: #e8d5f2;
            color: var(--text);
        }

        .message.admin .message-bubble {
            background: var(--purple);
            color: white;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .chat-input-area {
            padding: 12px;
            background: var(--white);
            border-top: 1px solid #eee;
            border-radius: 0 0 var(--radius) var(--radius);
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        .input-group input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        .input-group button {
            padding: 10px 16px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .input-group button:hover {
            background: var(--purple-dark);
        }

        /* Right Panel - Quick Actions & Templates */
        .actions-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
        }

        .action-card h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--purple);
        }

        .template-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            text-align: left;
            transition: all 0.2s;
        }

        .template-btn:hover {
            background: var(--purple);
            color: white;
            border-color: var(--purple);
        }

        .case-info {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
        }

        .case-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .case-info-label {
            font-weight: 600;
            color: var(--text-muted);
        }

        .case-info-value {
            color: var(--text);
        }

        .priority-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .priority-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .priority-btn.low { color: var(--success); border-color: var(--success); }
        .priority-btn.normal { color: var(--warning); border-color: var(--warning); }
        .priority-btn.high { color: var(--danger); border-color: var(--danger); }

        .priority-btn.active {
            background: currentColor;
            color: white;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }

            .actions-panel {
                grid-column: 1 / -1;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <h1>🚨 GBV Emergency Response Center</h1>
        <div class="status-indicator">
            <span class="status-dot"></span>
            <span>Live Monitoring Active</span>
        </div>
    </header>

    <div class="container">
        <!-- Left Panel: Reports List -->
        <div class="panel">
            <div class="panel-header">📋 Active Cases</div>
            <div class="reports-list" id="reportsList">
                <div class="empty-state">No reports yet</div>
            </div>
        </div>

        <!-- Center Panel: Live Chat -->
        <div class="panel chat-panel">
            <div class="chat-header" id="chatHeader">Select a case to start messaging</div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">Select a case to view messages</div>
            </div>
            <div class="chat-input-area">
                <div class="input-group">
                    <input type="text" id="messageInput" placeholder="Type your message..." disabled>
                    <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Actions & Templates -->
        <div class="actions-panel">
            <!-- Case Info -->
            <div class="action-card">
                <h3>📊 Case Details</h3>
                <div class="case-info" id="caseInfo">
                    <div class="empty-state">No case selected</div>
                </div>
            </div>

            <!-- Priority -->
            <div class="action-card">
                <h3>⚡ Set Priority</h3>
                <div class="priority-selector">
                    <button class="priority-btn low" onclick="setPriority('low')">Low</button>
                    <button class="priority-btn normal active" onclick="setPriority('normal')">Normal</button>
                    <button class="priority-btn high" onclick="setPriority('high')">Urgent</button>
                </div>
            </div>

            <!-- Quick Response Templates -->
            <div class="action-card">
                <h3>⚡ Quick Responses</h3>
                <div id="templatesContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let selectedReport = null;
        let allReports = [];
        let allMessages = [];
        let templates = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTemplates();
            setupSocketListeners();
        });

        // ── Socket.IO Listeners ──
        function setupSocketListeners() {
            socket.on('load_reports', (data) => {
                allReports = data;
                renderReports();
            });

            socket.on('new_report', (report) => {
                allReports.push(report);
                renderReports();
                showNotification(`New urgent case: ${report.type}`);
            });

            socket.on('new_message', (message) => {
                allMessages.push(message);
                if (selectedReport && message.reportId === selectedReport.id) {
                    renderMessages();
                }
            });

            socket.on('report_updated', (report) => {
                const index = allReports.findIndex(r => r.id === report.id);
                if (index !== -1) {
                    allReports[index] = report;
                    renderReports();
                    if (selectedReport && selectedReport.id === report.id) {
                        selectedReport = report;
                        renderCaseInfo();
                    }
                }
            });
        }

        // ── Load Templates ──
        async function loadTemplates() {
            try {
                const res = await fetch('/api/response-templates');
                templates = await res.json();
                renderTemplates();
            } catch (err) {
                console.error('Failed to load templates:', err);
            }
        }

        // ── Render Reports List ──
        function renderReports() {
            const container = document.getElementById('reportsList');
            if (allReports.length === 0) {
                container.innerHTML = '<div class="empty-state">No reports yet</div>';
                return;
            }

            container.innerHTML = allReports
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
                .map(report => `
                    <div class="report-item ${selectedReport?.id === report.id ? 'active' : ''} ${report.priority === 'high' ? 'urgent' : ''}"
                         onclick="selectReport('${report.id}')">
                        <div class="report-item-title">
                            ${report.priority === 'high' ? '🚨 ' : ''}${report.type.toUpperCase()}
                        </div>
                        <div class="report-item-meta">
                            <span class="badge badge-${report.status}">${report.status}</span>
                            ${report.anonymous ? 'Anonymous' : report.name}
                            <br>${new Date(report.timestamp).toLocaleTimeString()}
                        </div>
                    </div>
                `).join('');
        }

        // ── Select Report ──
        async function selectReport(reportId) {
            selectedReport = allReports.find(r => r.id === reportId);
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            renderReports();
            renderCaseInfo();
            await loadMessages();  // Wait for messages to load
            renderMessages();
            updateChatHeader();
        }

        // ── Load Messages ──
        async function loadMessages() {
            if (!selectedReport) return;
            try {
                const res = await fetch(`/api/reports/${selectedReport.id}/messages`);
                const data = await res.json();
                // Merge new messages with existing ones (avoid duplicates)
                allMessages = data.messages || [];
                console.log(`Loaded ${allMessages.length} messages for report ${selectedReport.id}`);
            } catch (err) {
                console.error('Failed to load messages:', err);
                allMessages = [];
            }
        }

        // ── Render Messages ──
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (!selectedReport) {
                container.innerHTML = '<div class="empty-state">Select a case to view messages</div>';
                return;
            }

            // Since we load messages for the selected report, allMessages should already be filtered
            if (!allMessages || allMessages.length === 0) {
                container.innerHTML = '<div class="empty-state">No messages yet. Start the conversation.</div>';
                return;
            }

            container.innerHTML = allMessages.map(msg => `
                <div class="message ${msg.senderRole}">
                    <div>
                        <div class="message-bubble">${escapeHtml(msg.message)}</div>
                        <div class="message-time">${msg.sender} • ${new Date(msg.timestamp).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        // ── Send Message ──
        async function sendMessage() {
            if (!selectedReport) return;
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            try {
                await fetch(`/api/reports/${selectedReport.id}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sender: 'Admin',
                        senderRole: 'admin',
                        message
                    })
                });
                input.value = '';
            } catch (err) {
                console.error('Failed to send message:', err);
            }
        }

        // ── Send Template Response ──
        function sendTemplate(templateMessage) {
            document.getElementById('messageInput').value = templateMessage;
            sendMessage();
        }

        // ── Set Priority ──
        function setPriority(priority) {
            if (!selectedReport) return;

            document.querySelectorAll('.priority-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            socket.emit('update_report', {
                id: selectedReport.id,
                priority
            });
        }

        // ── Render Case Info ──
        function renderCaseInfo() {
            const container = document.getElementById('caseInfo');
            if (!selectedReport) {
                container.innerHTML = '<div class="empty-state">No case selected</div>';
                return;
            }

            container.innerHTML = `
                <div class="case-info-row">
                    <span class="case-info-label">Type:</span>
                    <span class="case-info-value">${selectedReport.type}</span>
                </div>
                <div class="case-info-row">
                    <span class="case-info-label">Status:</span>
                    <span class="case-info-value">${selectedReport.status}</span>
                </div>
                <div class="case-info-row">
                    <span class="case-info-label">Priority:</span>
                    <span class="case-info-value">${selectedReport.priority}</span>
                </div>
                <div class="case-info-row">
                    <span class="case-info-label">Location:</span>
                    <span class="case-info-value">${selectedReport.location}</span>
                </div>
                <div class="case-info-row">
                    <span class="case-info-label">Reported:</span>
                    <span class="case-info-value">${new Date(selectedReport.timestamp).toLocaleString()}</span>
                </div>
            `;
        }

        // ── Render Templates ──
        function renderTemplates() {
            const container = document.getElementById('templatesContainer');
            container.innerHTML = templates.map(t => `
                <button class="template-btn" onclick="sendTemplate('${escapeHtml(t.message)}')">
                    ${t.title}
                </button>
            `).join('');
        }

        // ── Update Chat Header ──
        function updateChatHeader() {
            const header = document.getElementById('chatHeader');
            if (selectedReport) {
                header.textContent = `💬 Chat with ${selectedReport.anonymous ? 'Anonymous' : selectedReport.name}`;
            } else {
                header.textContent = 'Select a case to start messaging';
            }
        }

        // ── Utilities ──
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showNotification(msg) {
            alert(msg);
        }
    </script>

</body>

</html>
