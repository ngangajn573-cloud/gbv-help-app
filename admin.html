<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin dashboard for GBV Help App - View and manage submitted reports">
    <title>GBV Help App - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple: #6a1b9a;
            --purple-dark: #4a148c;
            --purple-light: #9c27b0;
            --danger: #c62828;
            --success: #2e7d32;
            --warning: #f57c00;
            --bg: #f5f5f5;
            --white: #ffffff;
            --text: #333;
            --text-muted: #666;
            --radius: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        .admin-header {
            background: var(--purple-dark);
            color: white;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .admin-header h1 {
            font-size: 1.5rem;
        }

        .admin-header .back-link {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            font-size: 14px;
        }

        .admin-header .back-link:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Stats */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 24px 32px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-card .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--purple);
        }

        .stat-card .stat-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Filters */
        .filters-bar {
            padding: 0 32px 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters-bar select,
        .filters-bar input {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .filters-bar button {
            padding: 10px 16px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .filters-bar button:hover {
            background: var(--purple-dark);
        }

        .btn-export {
            background: var(--success) !important;
        }

        .btn-export:hover {
            background: #1b5e20 !important;
        }

        /* Reports Table */
        .reports-container {
            padding: 0 32px 40px;
        }

        .report-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            overflow: hidden;
            border-left: 5px solid transparent;
        }

        .priority-high { border-left-color: var(--danger); }
        .priority-normal { border-left-color: var(--warning); }
        .priority-low { border-left-color: var(--success); }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #f9f9f9;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .report-header:hover {
            background: #f0f0f0;
        }

        .report-meta {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .report-id {
            font-size: 13px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .report-type {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .type-physical { background: var(--danger); }
        .type-sexual { background: #d32f2f; }
        .type-emotional { background: #7b1fa2; }
        .type-economic { background: var(--warning); }
        .type-stalking { background: #455a64; }
        .type-other { background: #757575; }

        .report-authority {
            font-size: 13px;
            color: var(--purple);
            font-weight: 600;
        }

        .report-time {
            font-size: 13px;
            color: var(--text-muted);
        }

        .report-status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status-received { background: #e1f5fe; color: #01579b; }
        .status-investigating { background: #fff3e0; color: #e65100; }
        .status-resolved { background: #e8f5e9; color: #1b5e20; }
        .status-closed { background: #f5f5f5; color: #616161; }

        .report-toggle {
            font-size: 20px;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .report-toggle.open {
            transform: rotate(180deg);
        }

        .report-details {
            padding: 20px;
            display: none;
        }

        .report-details.show {
            display: block;
        }

        .detail-row {
            margin-bottom: 16px;
        }

        .detail-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 15px;
        }

        .detail-value.description {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--purple);
            white-space: pre-wrap;
        }

        /* Admin Controls */
        .admin-controls {
            background: #f3e5f5;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
        }

        .admin-controls h4 {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--purple-dark);
        }

        .control-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-item label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .control-item select, 
        .control-item textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        .control-item textarea {
            width: 100%;
            min-height: 80px;
            resize: vertical;
        }

        .report-actions {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--purple);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--purple-dark);
        }

        .btn-outline {
            background: transparent;
            color: var(--purple);
            border: 1px solid var(--purple);
        }

        .btn-outline:hover {
            background: var(--purple);
            color: white;
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--success);
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .stats-bar, .filters-bar, .reports-container {
                padding-left: 16px;
                padding-right: 16px;
            }

            .admin-header {
                padding: 16px;
                flex-wrap: wrap;
                gap: 12px;
            }

            .report-meta {
                gap: 8px;
            }
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <h1>GBV Help — Admin Dashboard</h1>
        <a href="/" class="back-link">← Back to App</a>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-card">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Total Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statToday">0</div>
            <div class="stat-label">Today</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statUrgent">0</div>
            <div class="stat-label">Urgent Cases</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statResolved">0</div>
            <div class="stat-label">Resolved</div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
        <select id="filterType">
            <option value="">All Types</option>
            <option value="physical">Physical Violence</option>
            <option value="sexual">Sexual Violence</option>
            <option value="emotional">Emotional Abuse</option>
            <option value="economic">Economic Abuse</option>
            <option value="stalking">Stalking</option>
            <option value="other">Other</option>
        </select>
        <select id="filterAuthority">
            <option value="">All Authorities</option>
            <option value="police">Police</option>
            <option value="gbv-helpline">GBV Helpline</option>
            <option value="social-services">Social Services</option>
            <option value="legal-aid">Legal Aid</option>
        </select>
        <select id="filterStatus">
            <option value="">All Statuses</option>
            <option value="received">Received</option>
            <option value="investigating">Investigating</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search descriptions...">
        <button onclick="applyFilters()">Filter</button>
        <button class="btn-export" onclick="exportReports()">Export JSON</button>
        <button onclick="refreshReports()">Refresh</button>
    </div>

    <!-- Reports -->
    <div class="reports-container" id="reportsContainer">
        <div class="loading">Loading reports...</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let allReports = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchReports();
            fetchStats();
        });

        async function fetchReports() {
            try {
                const res = await fetch('/api/reports');
                const data = await res.json();
                allReports = data.reports || [];
                renderReports(allReports);
            } catch (err) {
                document.getElementById('reportsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Cannot connect to server. Make sure the backend is running.</p>
                        <p>Run: <code>cd backend && npm start</code></p>
                    </div>`;
            }
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/reports/stats');
                const data = await res.json();
                
                // Recalculate based on all reports for richer stats
                const urgent = allReports.filter(r => r.priority === 'high').length;
                const resolved = allReports.filter(r => r.status === 'resolved').length;
                
                document.getElementById('statTotal').textContent = data.totalReports;
                document.getElementById('statToday').textContent = data.todayReports;
                document.getElementById('statUrgent').textContent = urgent;
                document.getElementById('statResolved').textContent = resolved;
            } catch (err) {
                console.log('Stats unavailable');
            }
        }

        function renderReports(reports) {
            const container = document.getElementById('reportsContainer');

            if (reports.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>No reports found matching filters.</p>
                    </div>`;
                return;
            }

            // Sort by newest first
            const sorted = [...reports].sort((a, b) => 
                new Date(b.timestamp) - new Date(a.timestamp)
            );

            container.innerHTML = sorted.map((r, i) => `
                <div class="report-card priority-${r.priority || 'normal'}" id="report-${i}">
                    <div class="report-header" onclick="toggleReport(${i})">
                        <div class="report-meta">
                            <span class="report-type type-${r.type}">${capitalize(r.type)}</span>
                            <span class="report-status-badge status-${r.status || 'received'}">${r.status || 'received'}</span>
                            <span class="report-authority">→ ${capitalize(r.authority)}</span>
                            <span class="report-time">${formatDate(r.timestamp)}</span>
                            <span class="report-id">#${r.id.substring(0, 8)}</span>
                        </div>
                        <span class="report-toggle" id="toggle-${i}">▼</span>
                    </div>
                    <div class="report-details" id="details-${i}">
                        <div class="detail-row">
                            <div class="detail-label">Reporter</div>
                            <div class="detail-value">${r.anonymous ? 'Anonymous' : r.name} ${r.phone ? '· ' + r.phone : ''}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Location</div>
                            <div class="detail-value">${r.location}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Description</div>
                            <div class="detail-value description">${escapeHtml(r.description)}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Submitted At</div>
                            <div class="detail-value">${new Date(r.timestamp).toLocaleString()}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Last Updated</div>
                            <div class="detail-value">${r.lastUpdated ? new Date(r.lastUpdated).toLocaleString() : 'Never'}</div>
                        </div>
                        
                        <!-- Admin Management Section -->
                        <div class="admin-controls">
                            <h4>Admin Response & Management</h4>
                            <div class="control-group">
                                <div class="control-item">
                                    <label>Status</label>
                                    <select id="status-${r.id}">
                                        <option value="received" ${r.status === 'received' ? 'selected' : ''}>Received</option>
                                        <option value="investigating" ${r.status === 'investigating' ? 'selected' : ''}>Investigating</option>
                                        <option value="resolved" ${r.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                                        <option value="closed" ${r.status === 'closed' ? 'selected' : ''}>Closed</option>
                                    </select>
                                </div>
                                <div class="control-item">
                                    <label>Priority</label>
                                    <select id="priority-${r.id}">
                                        <option value="low" ${r.priority === 'low' ? 'selected' : ''}>Low</option>
                                        <option value="normal" ${r.priority === 'normal' || !r.priority ? 'selected' : ''}>Normal</option>
                                        <option value="high" ${r.priority === 'high' ? 'selected' : ''}>High (Urgent)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="control-item">
                                <label>Internal Admin Notes / Reply Draft</label>
                                <textarea id="notes-${r.id}" placeholder="Enter case updates or response notes here...">${r.adminNotes || ''}</textarea>
                            </div>
                            <div class="report-actions">
                                <button class="btn btn-primary" onclick="updateReport('${r.id}')">Save Changes</button>
                                <button class="btn btn-outline" onclick="copyReport(${i})">Copy Report</button>
                                <button class="btn btn-danger" onclick="deleteReport('${r.id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleReport(index) {
            const details = document.getElementById(`details-${index}`);
            const toggle = document.getElementById(`toggle-${index}`);
            details.classList.toggle('show');
            toggle.classList.toggle('open');
        }

        async function updateReport(id) {
            const status = document.getElementById(`status-${id}`).value;
            const priority = document.getElementById(`priority-${id}`).value;
            const adminNotes = document.getElementById(`notes-${id}`).value;

            try {
                const res = await fetch(`/api/reports/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status, priority, adminNotes })
                });

                if (res.ok) {
                    showToast('Report updated successfully');
                    await fetchReports();
                    await fetchStats();
                } else {
                    showToast('Failed to update report');
                }
            } catch (err) {
                showToast('Error connecting to server');
            }
        }

        function applyFilters() {
            const typeFilter = document.getElementById('filterType').value;
            const authorityFilter = document.getElementById('filterAuthority').value;
            const statusFilter = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allReports;

            if (typeFilter) {
                filtered = filtered.filter(r => r.type === typeFilter);
            }
            if (authorityFilter) {
                filtered = filtered.filter(r => r.authority === authorityFilter);
            }
            if (statusFilter) {
                filtered = filtered.filter(r => (r.status || 'received') === statusFilter);
            }
            if (search) {
                filtered = filtered.filter(r => 
                    r.description.toLowerCase().includes(search) ||
                    r.location.toLowerCase().includes(search) ||
                    (r.adminNotes && r.adminNotes.toLowerCase().includes(search))
                );
            }

            renderReports(filtered);
            showToast(`Showing ${filtered.length} of ${allReports.length} reports`);
        }

        async function deleteReport(id) {
            if (!confirm('Are you sure you want to delete this report? This cannot be undone.')) return;

            try {
                const res = await fetch(`/api/reports/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    await fetchReports();
                    await fetchStats();
                    showToast('Report deleted successfully');
                }
            } catch (err) {
                showToast('Failed to delete report');
            }
        }

        function copyReport(index) {
            const r = allReports.find((_, i) => i === index) || 
                      [...allReports].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[index];
            const text = [
                `GBV REPORT #${r.id}`,
                `Status: ${r.status || 'received'}`,
                `Priority: ${r.priority || 'normal'}`,
                `Date: ${new Date(r.timestamp).toLocaleString()}`,
                `Type: ${r.type}`,
                `Authority: ${r.authority}`,
                `Reporter: ${r.anonymous ? 'Anonymous' : r.name}`,
                r.phone ? `Phone: ${r.phone}` : '',
                `Location: ${r.location}`,
                ``,
                `DESCRIPTION:`,
                r.description,
                ``,
                r.adminNotes ? `ADMIN NOTES:\n${r.adminNotes}` : ''
            ].filter(Boolean).join('\n');

            navigator.clipboard.writeText(text).then(() => {
                showToast('Report copied to clipboard');
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Report copied to clipboard');
            });
        }

        function exportReports() {
            if (allReports.length === 0) {
                showToast('No reports to export');
                return;
            }
            const blob = new Blob([JSON.stringify(allReports, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gbv-reports-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`Exported ${allReports.length} reports`);
        }

        function refreshReports() {
            fetchReports();
            fetchStats();
            showToast('Reports refreshed');
        }

        // ── Utilities ──

        function capitalize(str) {
            return str.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function formatDate(iso) {
            const d = new Date(iso);
            const now = new Date();
            const diffMs = now - d;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return d.toLocaleDateString();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>

</body>

</html>
